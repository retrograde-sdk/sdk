<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RetroArcade SDK Test</title>
<style>html,body{margin:0;padding:0;height:100%;overflow:hidden}</style>
</head>
<body>
<div id="retro-arcade" style="width:100%;height:100vh"></div>
<script src="retro.min.js"></script>
<script>
  // Auto-init from script tag data attributes
  var scripts = document.querySelectorAll('script[data-target]');
  if (scripts.length > 0) {
    var target = scripts[scripts.length-1].getAttribute('data-target');
    new RetroArcade({ target: target }).init();
  } else {
    new RetroArcade({ target: '#retro-arcade' }).init();
  }
</script>
</body>
</html>
